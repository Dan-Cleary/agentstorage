name: Public CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  cli_checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: packages/cli/package-lock.json

      - name: Install CLI dependencies
        run: npm ci --prefix packages/cli

      - name: Lint CLI (if present)
        run: npm run lint --if-present --prefix packages/cli

      - name: Test CLI (if present)
        run: npm test --if-present --prefix packages/cli

      - name: Build CLI
        run: npm run build --prefix packages/cli

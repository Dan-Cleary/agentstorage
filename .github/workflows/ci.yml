name: Public CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  cli_checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: packages/cli/package-lock.json

      - name: Install CLI dependencies
        run: npm ci --prefix packages/cli

      - name: Lint CLI (if present)
        run: npm run lint --if-present --prefix packages/cli

      - name: Test CLI (if present)
        run: npm test --if-present --prefix packages/cli

      - name: Build CLI
        run: npm run build --prefix packages/cli
